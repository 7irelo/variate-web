apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: variate
spec:
  replicas: 2
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      containers:
        - name: auth-service
          image: variateacr.azurecr.io/auth-service:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          env:
            - name: Jwt__Issuer
              valueFrom:
                configMapKeyRef:
                  name: variate-config
                  key: jwt-issuer
            - name: Jwt__Audience
              valueFrom:
                configMapKeyRef:
                  name: variate-config
                  key: jwt-audience
            - name: Jwt__SigningKey
              valueFrom:
                secretKeyRef:
                  name: variate-secrets
                  key: jwt-signing-key
          readinessProbe:
            httpGet:
              path: /api/v1/auth/health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: auth-service
  namespace: variate
spec:
  selector:
    app: auth-service
  ports:
    - port: 8080
      targetPort: 8080
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: catalog-service
  namespace: variate
spec:
  replicas: 2
  selector:
    matchLabels:
      app: catalog-service
  template:
    metadata:
      labels:
        app: catalog-service
    spec:
      containers:
        - name: catalog-service
          image: variateacr.azurecr.io/catalog-service:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          env:
            - name: MSSQL_SA_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: variate-secrets
                  key: mssql-sa-password
            - name: ConnectionStrings__CatalogDb
              value: Server=sqlserver,1433;Database=variate_catalog;User Id=sa;Password=$(MSSQL_SA_PASSWORD);TrustServerCertificate=True;
            - name: Jwt__Issuer
              valueFrom:
                configMapKeyRef:
                  name: variate-config
                  key: jwt-issuer
            - name: Jwt__Audience
              valueFrom:
                configMapKeyRef:
                  name: variate-config
                  key: jwt-audience
            - name: Jwt__SigningKey
              valueFrom:
                secretKeyRef:
                  name: variate-secrets
                  key: jwt-signing-key
          readinessProbe:
            httpGet:
              path: /api/v1/catalog/health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: catalog-service
  namespace: variate
spec:
  selector:
    app: catalog-service
  ports:
    - port: 8080
      targetPort: 8080
---
